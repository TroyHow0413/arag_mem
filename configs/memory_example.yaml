# Configuration example for Memory Agent
# This shows how to configure the Re-MEMR1 memory mechanism

llm:
  temperature: 0.0
  max_tokens: 16384

embedding:
  model: "Qwen/Qwen3-Embedding-0.6B"
  device: "cuda:0"
  batch_size: 16

agent:
  max_loops: 15
  max_token_budget: 128000
  verbose: false

# Memory-specific configuration (for --agent-type memory)
memory:
  chunk_size: 512                    # Size of each chunk in tokens
  max_memorization_length: 512       # Max tokens for memory update
  max_final_response_length: 1024    # Max tokens for final answer

data:
  chunks_file: "data/chunks.json"
  questions_file: "data/questions.json"
  index_dir: "data/index"

output:
  results_dir: "results/"
